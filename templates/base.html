{{ define "base.html" }}
<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>
			{{ .PageTitle }} {{ if .PageTitle }} | {{ end }} Are They Up
		</title>
		<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
			rel="stylesheet"
			type="text/css"
		/>
	</head>
	<body class="min-h-screen antialiased bg-base-100 flex flex-col">
		{{ template "navbar" . }}
		<main class="flex-1">{{ block "content" . }}{{ end }}</main>
		{{ template "footer" . }}
	</body>
</html>
{{ end }}
