{{define "service.html"}}
<!doctype html>
<html lang="en" data-theme="dracula">
	{{ template "head" . }}

	<body>
		{{ template "navbar" . }}
		<main class="flex-1">
			<div class="mx-auto px-4 pt-16 pb-12 max-w-2xl">
				<div class="mb-8">
					<a
						href="/"
						class="text-sm text-base-content/50 hover:text-base-content flex items-center gap-2"
					>
						{{ lucide "arrow-left" (dict "size" 16) }} Back to all
						services
					</a>
				</div>

				<div
					id="service-card"
					hx-get="/api/service/{{ .serviceSlug }}"
					hx-trigger="load, every 10s [!document.hidden], every 60s [document.hidden]"
					hx-swap="innerHTML"
				>
					<div class="animate-pulse space-y-3">
						<div class="h-4 bg-base-200 rounded w-24"></div>
						<div class="h-10 bg-base-200 rounded"></div>
						<div class="h-10 bg-base-200 rounded"></div>
					</div>
				</div>
			</div>
		</main>
		{{ template "footer" . }}
	</body>
</html>
{{ end }}
