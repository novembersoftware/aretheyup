{{define "service.html"}}
<!doctype html>
<html lang="en" data-theme="dracula">
{{ template "head" . }}

<body>
	{{ template "navbar" . }}
	<main class="flex-1">
		<div class="relative mx-auto px-4 pt-14 pb-14 max-w-6xl">
			<div class="mb-8">
				<a href="/" class="text-sm text-base-content/60 hover:text-base-content flex items-center gap-2">
					{{ lucide "arrow-left" (dict "size" 16) }} Back to all
					services
				</a>
			</div>

			<div id="service-card" hx-get="/api/service/{{ .Slug }}"
				hx-trigger="load, every 10s [!document.hidden], every 60s [document.hidden]" hx-swap="innerHTML"></div>
		</div>
	</main>
	{{ template "footer" . }}
</body>

</html>
{{ end }}
