{{define "index.html"}}
<!doctype html>
<html lang="en" data-theme="dracula">
{{ template "head" . }}

<body>
	{{ template "navbar" . }}
	<main class="flex-1">
		<div class="relative mx-auto px-4 pt-14 pb-14 max-w-7xl">
			<div class="rounded-3xl border border-base-content/10 bg-base-100/85 backdrop-blur p-6 sm:p-8 mb-8">
				<div class="flex flex-col gap-4 sm:flex-row items-start sm:items-center sm:justify-between">
					<div>
						<h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-base-content mb-3">Is it down for
							everyone or just you?</h1>
						<p class="text-sm text-base-content/70 max-w-2xl">Monitor live user reports and
							detect service disruptions in real time.</p>
					</div>

					<div id="service-count" class="sm:block hidden" hx-get="/api/services/count"
						hx-trigger="load, every 60s [!document.hidden]" hx-swap="innerHTML">
					</div>
				</div>

				<div class="mt-6">
					<div class="relative items-center">
						<input id="q" name="q"
							class="input h-12 w-full rounded-xl bg-base-200/60 border-base-content/10 font-mono text-sm placeholder:text-base-content/35"
							placeholder="Search for a service..." autocomplete="off" spellcheck="false"
							hx-get="/api/services/search" hx-trigger="input changed delay:300ms"
							hx-target="#service-list" hx-swap="innerHTML" hx-indicator="#search-spinner" />
						<span id="search-spinner" class="htmx-indicator absolute right-3 top-1/2 -translate-y-1/2">
							<span class="loading loading-spinner loading-xs text-base-content/40"></span>
						</span>
					</div>
				</div>
			</div>

			<div id="service-list" hx-get="/api/services?page=1"
				hx-trigger="load, every 10s [document.getElementById('q').value === '' && !document.hidden && window.scrollY < 160], every 60s [document.getElementById('q').value === '' && document.hidden]"
				hx-swap="innerHTML">
			</div>
		</div>
	</main>
	{{ template "footer" . }}
</body>

</html>
{{ end }}
