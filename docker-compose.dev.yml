services:
  postgres:
    image: postgres:16-alpine
    container_name: aretheyup-postgres
    environment:
      POSTGRES_USER: aretheyup
      POSTGRES_PASSWORD: aretheyup
      POSTGRES_DB: aretheyup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aretheyup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
